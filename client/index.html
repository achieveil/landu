<!DOCTYPE html>
<html lang="zh-Hans">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/png" sizes="128x128" href="./favicon.png">
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="./favicon.ico" alt="Landu">
    </div>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换深色模式">
      <span id="themeIcon" class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
    </button>
  </header>

  <main class="page">
    <section class="identity" aria-label="本机状态">
      <div>
        <span>本机名称:</span>
        <strong id="currentDisplayName">加载中...</strong>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div>
        <span>PIN:</span>
        <button id="pinButton" class="pin-button" type="button">
          <strong id="pinValue">未设置</strong>
        </button>
      </div>
    </section>

    <section class="peer-stage" aria-label="连接设备">
      <div id="peerList" class="peer-list" aria-live="polite"></div>
      <div id="emptyPeers" class="empty-peers">
        <div class="empty-copy">
          <strong>在另外一台设备上打开 <img class="inline-logo" src="./favicon.ico" alt="Landu"></strong>
          <div class="empty-addresses">
            <code id="mdnsAddress">加载中...</code>
            <code id="ipAddress">加载中...</code>
          </div>
          <span>打开同一个本地地址的设备会自动显示在这里</span>
        </div>
        <button id="qrToggle" class="qr-card" type="button" aria-label="切换地址二维码">
          <img id="addressQr" alt="服务地址二维码">
          <span id="qrLabel">mDNS 地址</span>
        </button>
      </div>
    </section>

    <input id="fileInput" class="visually-hidden" type="file" title="选择要发送的文件" />

    <section class="workspace">
      <div id="fileList" class="list transfer-list" aria-live="polite"></div>

      <section class="panel">
        <div class="panel-header">
          <h2>剪贴板</h2>
          <div class="clipboard-tools">
            <span id="clipboardState" class="muted">自动同步</span>
            <button id="copyClipboardBtn" class="secondary compact" type="button">复制到本机</button>
          </div>
        </div>
        <div id="clipboardText" class="clipboard-editor" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="在此输入或粘贴要同步的内容..."></div>
        <div class="actions">
          <button id="readClipboardBtn" class="secondary" type="button">读取剪贴板</button>
        </div>
      </section>
    </section>
  </main>

  <div id="transferModal" class="transfer-modal" hidden>
    <section class="transfer-dialog" role="dialog" aria-modal="true" aria-labelledby="transferTitle">
      <h2 id="transferTitle">发送文件中...</h2>
      <div class="transfer-row">
        <strong>Total:</strong>
        <span id="transferTotalText">0 B / 0 B</span>
      </div>
      <progress id="transferTotalProgress" max="100" value="0"></progress>
      <div class="transfer-label">Files:</div>
      <div class="transfer-row">
        <span id="transferFileName"></span>
        <span id="transferFileSize"></span>
      </div>
      <progress id="transferFileProgress" max="100" value="0"></progress>
    </section>
  </div>

  <dialog id="pinDialog" class="pin-dialog">
    <form method="dialog">
      <h2>设置 PIN</h2>
      <input id="pinInput" type="text" inputmode="numeric" autocomplete="off" placeholder="留空表示不使用 PIN" />
      <div class="dialog-actions">
        <button class="secondary" type="submit" value="cancel">取消</button>
        <button type="submit" value="save">保存</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="./app.js"></script>
</body>

</html>
